name: Docker Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/fly-demo:${{ github.sha }} .
          docker build -t ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/fly-demo:latest .
          docker push ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/fly-demo:${{ github.sha }}
          docker push ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/fly-demo:latest
